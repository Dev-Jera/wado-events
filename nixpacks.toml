[phases.setup]
nixPkgs = ['php82', 'php82Extensions.zip', 'php82Extensions.intl', 'php82Extensions.gd', 'php82Packages.composer', 'nodejs_20', 'nodePackages.npm']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist',
    'npm ci',
    'npm run build'
]

[start]
cmd = 'bash start.sh'
